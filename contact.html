<main class="container my-4">
  <!-- Contact section (from cont_sect.php) -->
  <section class="contact-section">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card p-4">
          <h5>Get In Touch</h5>
          <form id="contactForm">
            <div class="mb-3"><input class="form-control" id="name" type="text" placeholder="Name & Surname" required></div>
            <div class="mb-3"><input class="form-control" id="phone" type="text" placeholder="Contact Number" required></div>
            <div class="mb-3"><input class="form-control" id="email" type="email" placeholder="Email Address" required></div>
            <div class="mb-3"><textarea class="form-control" id="message" placeholder="Enquiry" style="height:10rem" required></textarea></div>
            <div id="submitSuccessMessage" class="alert alert-success d-none">Form submission successful!</div>
            <div id="submitErrorMessage" class="alert alert-danger d-none">Error sending message!</div>
            <div class="d-grid"><button class="btn btn-primary btn-lg" type="submit">Submit</button></div>
          </form>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e){
  e.preventDefault();
  // Simple client-only behaviour: show success message
  document.getElementById('submitSuccessMessage').classList.remove('d-none');
  setTimeout(()=>document.getElementById('submitSuccessMessage').classList.add('d-none'),4000);
});
</script>
